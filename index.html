<div class="container">
  <div class="card">

    <div class="logo">
      <img src="assets/logo.svg">
    </div>

    <h2>طلب بطاقات سوا</h2>

    <div class="input-group">
      <input type="text" id="firstName" placeholder="الاسم الأول">
      <input type="text" id="secondName" placeholder="الاسم الثاني">
      <input type="text" id="thirdName" placeholder="الاسم الثالث">
    </div>

    <input type="text" id="phone" placeholder="رقم الجوال">
    <div class="note">اكتب بدون 0 (مثال: 5XXXXXXXX)</div>

    <select id="packageSelect">
      <option value="">اختر الشريحة</option>
      <option value="1">الشريحة 1 - 500 ريال</option>
      <option value="2">الشريحة 2 - 1000 ريال</option>
      <option value="3">الشريحة 3 - 1500 ريال</option>
      <option value="4">الشريحة 4 - 1880 ريال</option>
      <option value="5">الشريحة 5 - 2000 ريال</option>
      <option value="6">الشريحة 6 - 2500 ريال</option>
    </select>

    <div id="result" class="result"></div>

    <button class="confirm" onclick="confirmOrder()">تأكيد الطلب</button>
    <button class="cancel" onclick="cancelOrder()">إلغاء</button>

  </div>
</div>
