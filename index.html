<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>Tera System</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body {
  font-family: Arial;
  direction: rtl;
  background: #f5f5f5;
  padding: 30px;
}

.box {
  background: #fff;
  padding: 20px;
  border-radius: 10px;
  max-width: 400px;
  margin: auto;
}

input, select {
  width: 100%;
  padding: 10px;
  margin-bottom: 10px;
}

.note {
  font-size: 12px;
  color: #888;
  margin-bottom: 10px;
}

.result {
  background: #fafafa;
  padding: 15px;
  border-radius: 8px;
}

.profit {
  color: green;
  font-weight: bold;
}

button {
  width: 100%;
  padding: 12px;
  margin-top: 10px;
  border: none;
  border-radius: 6px;
  cursor: pointer;
}

.whatsapp { background: #25D366; color: white; }
.pdf { background: #333; color: white; }
</style>
</head>

<body>

<div class="box">

<h2>💳 طلب بطاقات سوا</h2>

<input type="text" id="name" placeholder="الاسم الكامل">

<input type="text" id="phoneInput" placeholder="رقم الجوال">
<div class="note">⚠️ اكتب رقم الجوال بدون 0 (مثال: 5XXXXXXXX)</div>

<select id="packageSelect">
  <option value="">اختر الشريحة</option>
  <option value="1">الشريحة الأولى</option>
  <option value="2">الشريحة الثانية</option>
  <option value="3">الشريحة الثالثة</option>
  <option value="4">الشريحة الرابعة</option>
  <option value="5">الشريحة الخامسة</option>
  <option value="6">الشريحة السادسة</option>
</select>

<div id="result" class="result"></div>

<button class="pdf" onclick="generatePDF()">📄 تحميل PDF</button>
<button class="whatsapp" onclick="sendWhatsApp()">📲 إرسال واتساب</button>

</div>

<script>
const { jsPDF } = window.jspdf;

const packages = [
  {id:1,cards:25,total:500,down:125,fees:125,net:250},
  {id:2,cards:50,total:1000,down:250,fees:250,net:500},
  {id:3,cards:75,total:1500,down:375,fees:325,net:800},
  {id:4,cards:94,total:1880,down:470,fees:410,net:1000},
  {id:5,cards:100,total:2000,down:500,fees:450,net:1050},
  {id:6,cards:125,total:2500,down:625,fees:575,net:1300}
];

let selectedPackage = null;

document.getElementById("packageSelect").addEventListener("change", function(){
  const pkg = packages.find(p => p.id == this.value);
  if(!pkg) return;

  selectedPackage = pkg;

  document.getElementById("result").innerHTML = `
    <p>📦 عدد البطاقات: ${pkg.cards}</p>
    <p>💰 القيمة: ${pkg.total} ريال</p>
    <p>💳 الدفعة الأولى: ${pkg.down} ريال</p>
    <p>📊 الرسوم: ${pkg.fees} ريال</p>
    <hr>
    <p class="profit">💰 الربح المتوقع: ${pkg.net} ريال</p>
  `;
});

function generatePDF() {
  if (!selectedPackage) return alert("اختر الشريحة");

  const name = document.getElementById("name").value;
  const phone = document.getElementById("phoneInput").value;

  const doc = new jsPDF();

  doc.text(`طلب بطاقات سوا`, 10, 10);
  doc.text(`الاسم: ${name}`, 10, 20);
  doc.text(`الجوال: ${phone}`, 10, 30);
  doc.text(`الشريحة: ${selectedPackage.id}`, 10, 40);
  doc.text(`عدد البطاقات: ${selectedPackage.cards}`, 10, 50);
  doc.text(`القيمة: ${selectedPackage.total}`, 10, 60);
  doc.text(`الربح: ${selectedPackage.net}`, 10, 70);

  doc.save("tera-order.pdf");
}

function sendWhatsApp() {
  const name = document.getElementById("name").value;
  const phoneInput = document.getElementById("phoneInput").value;

  if (!name || !phoneInput || !selectedPackage) {
    alert("⚠️ أكمل البيانات");
    return;
  }

  const message = `
طلب جديد

الاسم: ${name}
الجوال: 966${phoneInput}

الشريحة: ${selectedPackage.id}
القيمة: ${selectedPackage.total}
الربح: ${selectedPackage.net}
  `;

  const url = "https://wa.me/966555698774?text=" + encodeURIComponent(message);
  window.open(url, "_blank");
}
</script>

</body>
</html>
