<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>منصة تيرا</title>

<meta name="description" content="طلب شراء بطاقات سوا - منصة تيرا">

<link rel="stylesheet" href="css/style.css">
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap" rel="stylesheet">

</head>

<body>

<div class="container">

<img src="assets/logo.svg" class="logo" alt="شعار منصة تيرا">

<h1>مرحباً بكم في منصة تيرا</h1>
<p class="subtitle">عالم بلا حدود</p>

<div class="card">

<h2>طلب شراء بطاقات سوا</h2>

<div class="row">
<input type="text" id="fname" placeholder="الاسم الأول" required autofocus>
<input type="text" id="mname" placeholder="الاسم الثاني">
<input type="text" id="lname" placeholder="اسم العائلة" required>
</div>

<input 
type="tel" 
id="phone" 
placeholder="5XXXXXXXX" 
maxlength="9"
pattern="[0-9]*"
inputmode="numeric"
required
>

<div class="question">
<p>هل لديكم دفعة أولى؟</p>
<button type="button" onclick="setMode('yes',event)">نعم</button>
<button type="button" onclick="setMode('no',event)">لا</button>
</div>

<div id="plans"></div>

<div class="actions">
<button type="button" class="confirm" onclick="confirmOrder()">تأكيد الطلب</button>
<button type="button" class="cancel" onclick="resetAll()">إلغاء الطلب</button>
</div>

</div>
</div>

<!-- Modal -->
<div id="modal" class="modal hidden">
<div class="modal-content">
<p>جاري إرسال الطلب...</p>
<div class="loader"></div>
<p id="status"></p>
<button type="button" onclick="closeModal()">إغلاق</button>
</div>
</div>

<script src="js/app.js"></script>

</body>
</html>
