<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>طلب شراء بطاقات سوا – تيرا</title>
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="icon" href="assets/logo.svg" type="image/svg+xml">
</head>
<body>
    <div class="container">
        <div class="header">
            <img src="assets/logo.svg" alt="شعار تيرا" class="logo">
            <h1>طلب شراء بطاقات سوا</h1>
            <p class="subtitle">منصة تيرا – اختر الشريحة المناسبة</p>
        </div>

        <form id="orderForm" novalidate>
            <div class="form-group">
                <label for="firstName">الاسم الأول *</label>
                <input type="text" id="firstName" name="firstName" required placeholder="أدخل الاسم الأول">
            </div>
            <div class="form-group">
                <label for="secondName">الاسم الثاني *</label>
                <input type="text" id="secondName" name="secondName" required placeholder="أدخل الاسم الثاني">
            </div>
            <div class="form-group">
                <label for="familyName">اسم العائلة *</label>
                <input type="text" id="familyName" name="familyName" required placeholder="أدخل اسم العائلة">
            </div>
            <div class="form-group">
                <label for="mobile">رقم الجوال (بدون 50) *</label>
                <input type="tel" id="mobile" name="mobile" required placeholder="مثال: 512345678" inputmode="numeric" maxlength="9">
                <small class="hint">أدخل 9 أرقام فقط، مثال: 512345678</small>
            </div>

            <div class="payment-methods">
                <p class="section-title">طريقة الشراء *</p>
                <div class="radio-group">
                    <label class="radio-card">
                        <input type="radio" name="paymentMethod" value="platform">
                        <span class="radio-title">🟢 دفعة من المنصة</span>
                    </label>
                    <label class="radio-card">
                        <input type="radio" name="paymentMethod" value="customer">
                        <span class="radio-title">🔵 دفعة من العميل</span>
                    </label>
                </div>
            </div>

            <div id="packagesContainer" class="packages-grid" style="display: none;">
                <!-- سيتم عرض الشرائح هنا ديناميكياً -->
            </div>

            <div class="actions">
                <button type="button" id="confirmBtn" class="btn btn-primary">تأكيد الطلب</button>
                <button type="button" id="cancelBtn" class="btn btn-secondary">إلغاء الطلب</button>
            </div>
        </form>
    </div>

    <!-- مودال التأكيد المخصص -->
    <div id="confirmModal" class="modal" style="display: none;">
        <div class="modal-content">
            <p>أنت الآن تؤكد طلب الشراء، هل ترغب في الاستمرار؟</p>
            <div class="modal-buttons">
                <button id="confirmYes" class="btn btn-primary">نعم</button>
                <button id="confirmNo" class="btn btn-secondary">لا</button>
            </div>
        </div>
    </div>

    <!-- طبقة التحميل -->
    <div id="loadingOverlay" class="loading-overlay" style="display: none;">
        <div class="spinner"></div>
        <p>جاري إرسال الطلب...</p>
    </div>

    <script src="assets/js/app.js"></script>
</body>
</html>
