<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>Tera System</title>

<style>
body {
  font-family: Arial;
  direction: rtl;
  background: #f5f5f5;
  padding: 30px;
}

.box {
  background: #fff;
  padding: 20px;
  border-radius: 10px;
  max-width: 400px;
  margin: auto;
  box-shadow: 0 0 10px #ddd;
}

input, select {
  width: 100%;
  padding: 10px;
  margin-bottom: 15px;
}

.result {
  background: #fafafa;
  padding: 15px;
  border-radius: 8px;
}

.net {
  color: green;
  font-weight: bold;
}

button {
  width: 100%;
  padding: 12px;
  margin-top: 10px;
  border: none;
  border-radius: 6px;
  cursor: pointer;
}

.confirm { background: green; color: white; }
.cancel { background: red; color: white; }
.whatsapp { background: #25D366; color: white; }
</style>
</head>

<body>

<div class="box">

<h2>💳 طلب بطاقات سوا</h2>

<input type="text" id="name" placeholder="اسم العميل">
<input type="text" id="phoneInput" placeholder="رقم الجوال">

<select id="packageSelect">
  <option value="">اختر الشريحة</option>
  <option value="1">الشريحة الأولى</option>
  <option value="2">الشريحة الثانية</option>
  <option value="3">الشريحة الثالثة</option>
  <option value="4">الشريحة الرابعة</option>
  <option value="5">الشريحة الخامسة</option>
  <option value="6">الشريحة السادسة</option>
</select>

<select id="paymentMethod">
  <option value="">اختر طريقة الدفع</option>
  <option>إمكان</option>
  <option>تابي</option>
  <option>تمارا</option>
</select>

<div id="result" class="result"></div>

<button class="whatsapp" onclick="sendWhatsApp()">📲 إرسال الطلب واتساب</button>

</div>

<script>
const packages = [
  {id:1,cards:25,total:500,down:125,remaining:375,fees:125,net:250},
  {id:2,cards:50,total:1000,down:250,remaining:750,fees:250,net:500},
  {id:3,cards:75,total:1500,down:375,remaining:1125,fees:325,net:800},
  {id:4,cards:94,total:1880,down:470,remaining:1410,fees:410,net:1000},
  {id:5,cards:100,total:2000,down:500,remaining:1500,fees:450,net:1050},
  {id:6,cards:125,total:2500,down:625,remaining:1875,fees:575,net:1300}
];

let selectedPackage = null;

document.getElementById("packageSelect").addEventListener("change", function(){
  const pkg = packages.find(p => p.id == this.value);
  if(!pkg) return;

  selectedPackage = pkg;

  document.getElementById("result").innerHTML = `
    <p>📦 عدد البطاقات: ${pkg.cards}</p>
    <p>💰 القيمة: ${pkg.total} ريال</p>
    <p>💳 الدفعة الأولى: ${pkg.down} ريال</p>
    <p>📊 الرسوم: ${pkg.fees} ريال</p>
    <hr>
    <p class="net">💵 الصافي: ${pkg.net} ريال</p>
  `;
});

function sendWhatsApp() {

  const name = document.getElementById("name").value;
  const phoneInput = document.getElementById("phoneInput").value;
  const payment = document.getElementById("paymentMethod").value;

  if (!name || !phoneInput || !selectedPackage || !payment) {
    alert("⚠️ يرجى تعبئة جميع البيانات");
    return;
  }

  const message = `
📦 طلب جديد

👤 الاسم: ${name}
📱 الجوال: ${phoneInput}

💳 الشريحة: ${selectedPackage.id}
عدد البطاقات: ${selectedPackage.cards}
القيمة: ${selectedPackage.total} ريال
الدفعة الأولى: ${selectedPackage.down} ريال
إجمالي الرسوم: ${selectedPackage.fees} ريال

💰 الصافي: ${selectedPackage.net} ريال

💳 طريقة الدفع: ${payment}
  `;

  const phone = "966555698774";
  const url = "https://wa.me/" + phone + "?text=" + encodeURIComponent(message);

  window.open(url, "_blank");
}
</script>

</body>
</html>
