<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8">
  <title>Tera System</title>
</head>
<body>

<h2>اختر الشريحة</h2>

<select id="packageSelect">
  <option value="">اختر</option>
  <option value="1">الشريحة 1</option>
  <option value="2">الشريحة 2</option>
  <option value="3">الشريحة 3</option>
  <option value="4">الشريحة 4</option>
  <option value="5">الشريحة 5</option>
  <option value="6">الشريحة 6</option>
</select>

<div id="result"></div>

<script>
const packages = [
  {id:1,cards:25,total:500,down:125,net:250},
  {id:2,cards:50,total:1000,down:250,net:500},
  {id:3,cards:75,total:1500,down:375,net:800},
  {id:4,cards:94,total:1880,down:470,net:1000},
  {id:5,cards:100,total:2000,down:500,net:1050},
  {id:6,cards:125,total:2500,down:625,net:1300}
];

document.getElementById("packageSelect").addEventListener("change", function(){
  const pkg = packages.find(p => p.id == this.value);
  if(!pkg) return;

  document.getElementById("result").innerHTML = `
    <p>عدد البطاقات: ${pkg.cards}</p>
    <p>القيمة: ${pkg.total} ريال</p>
    <p>الدفعة الأولى: ${pkg.down} ريال</p>
    <p><strong>الصافي: ${pkg.net} ريال</strong></p>
  `;
});
</script>

</body>
</html>
