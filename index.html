<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tera System</title>

<link rel="stylesheet" href="css/style.css">

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
</head>

<body>

<div class="container">
  <div class="card">

    <div class="logo">
      <img src="assets/logo.svg">
    </div>

    <h2>طلب بطاقات سوا</h2>

    <input type="text" id="name" placeholder="الاسم الكامل">

    <input type="text" id="phoneInput" placeholder="رقم الجوال">
    <small>اكتب بدون 0 (مثال: 5XXXXXXXX)</small>

    <select id="packageSelect">
      <option value="">اختر الشريحة</option>
      <option value="1">الشريحة الأولى</option>
      <option value="2">الشريحة الثانية</option>
      <option value="3">الشريحة الثالثة</option>
      <option value="4">الشريحة الرابعة</option>
      <option value="5">الشريحة الخامسة</option>
      <option value="6">الشريحة السادسة</option>
    </select>

    <div id="result" class="result"></div>

    <button class="pdf" onclick="generatePDF()">📄 تحميل PDF</button>
    <button class="whatsapp" onclick="sendWhatsApp()">📲 إرسال واتساب</button>

  </div>
</div>

<script src="js/app.js"></script>

</body>
</html>
