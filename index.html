<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>منصة تيرا</title>
<link rel="stylesheet" href="css/style.css">
</head>

<body>

<div class="container">

  <h1>منصة تيرا</h1>
  <p>عالم بلا حدود</p>

  <!-- النموذج -->
  <div class="form">
    <input type="text" id="firstName" placeholder="الاسم الأول">
    <input type="text" id="secondName" placeholder="الاسم الثاني">
    <input type="text" id="lastName" placeholder="اسم العائلة">
    <input type="text" id="mobile" placeholder="5XXXXXXXX">

    <!-- هل لديه دفعة -->
    <div class="payment-option">
      <label><input type="radio" name="payment" value="yes"> نعم</label>
      <label><input type="radio" name="payment" value="no" checked> لا</label>
    </div>
  </div>

  <!-- الباقات -->
  <div class="cards">

    <div class="card" data-plan="الشريحة الخامسة" data-amount="2000" data-net="1050">
      <h3>الشريحة الخامسة 🔥</h3>
      <p>القيمة: 2000 ريال</p>
      <p class="down-payment">الدفعة: 500 ريال</p>
      <p class="fees">الرسوم: 450 ريال</p>
      <p class="net">الصافي: 1050 ريال</p>
      <button onclick="selectPlan(this)">اختيار</button>
    </div>

    <div class="card" data-plan="الشريحة الثالثة" data-amount="1500" data-net="800">
      <h3>الشريحة الثالثة ⭐</h3>
      <p>القيمة: 1500 ريال</p>
      <p class="down-payment">الدفعة: 375 ريال</p>
      <p class="fees">الرسوم: 325 ريال</p>
      <p class="net">الصافي: 800 ريال</p>
      <button onclick="selectPlan(this)">اختيار</button>
    </div>

  </div>

  <!-- أزرار -->
  <div class="actions">
    <button class="confirm" onclick="confirmOrder()">تأكيد الطلب</button>
    <button class="cancel" onclick="resetForm()">إلغاء</button>
  </div>

</div>

<!-- مودال -->
<div id="modal" class="modal">
  <div class="modal-content">
    <p id="modalText"></p>
    <div id="loader" class="loader"></div>
    <button onclick="closeModal()">إغلاق</button>
  </div>
</div>

<script src="js/app.js"></script>
</body>
</html>
