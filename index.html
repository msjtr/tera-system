<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>منصة تيرا</title>

<link rel="stylesheet" href="css/style.css">
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap" rel="stylesheet">

</head>

<body>

<div class="container">

<img src="assets/logo.svg" class="logo">

<h1>مرحباً بكم في منصة تيرا</h1>
<p class="subtitle">عالم بلا حدود</p>

<div class="card">

<h2>طلب شراء بطاقات سوا</h2>

<div class="row">
<input id="fname" placeholder="الاسم الأول">
<input id="mname" placeholder="الاسم الثاني">
<input id="lname" placeholder="اسم العائلة">
</div>

<input id="phone" placeholder="5XXXXXXXX" maxlength="9">

<div class="question">
<p>هل لديكم دفعة أولى؟</p>
<button onclick="setMode('yes',event)">نعم</button>
<button onclick="setMode('no',event)">لا</button>
</div>

<!-- Slider -->
<div class="slider-container">
    <div id="slider" class="slider"></div>
</div>

<div id="pagination"></div>

<div class="actions">
<button class="confirm" onclick="confirmOrder()">تأكيد الطلب</button>
<button class="cancel" onclick="resetAll()">إلغاء الطلب</button>
</div>

</div>
</div>

<!-- Modal -->
<div id="modal" class="modal hidden">
<div class="modal-content">
<p>جاري إرسال الطلب...</p>
<div class="loader"></div>
<p id="status"></p>
<button onclick="closeModal()">إغلاق</button>
</div>
</div>

<script src="js/app.js"></script>

</body>
</html>
